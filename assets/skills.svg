<svg width="900" height="340" viewBox="0 0 900 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Skill window: TypeScript, Python, JavaScript, React, Node.js, Cloudflare Workers">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#4CC9F0" opacity="0.04"/>
    </pattern>
    <linearGradient id="panelfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0C1430"/>
      <stop offset="1" stop-color="#070B1A"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace; }
    .hdr { fill: #4CC9F0; font-size: 13px; letter-spacing: 5px; }
    .dot { fill: #4CC9F0; animation: blink 2s steps(1) infinite; }
    .skill { fill: #EAF2FF; font-size: 15px; }
    .lv { fill: #4CC9F0; font-size: 13px; font-weight: 700; }
    .lv2 { fill: #9D5CFF; font-size: 13px; font-weight: 700; }
    .passive { fill: #55608A; font-size: 12px; letter-spacing: 2px; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <rect x="20" y="20" width="860" height="300" rx="10" fill="url(#panelfade)"/>
  <rect x="20" y="20" width="860" height="300" rx="10" fill="url(#scan)"/>
  <rect x="20.5" y="20.5" width="859" height="299" rx="9.5" stroke="#4CC9F0" stroke-opacity="0.55" filter="url(#glow)"/>
  <g stroke="#4CC9F0" stroke-width="2.5" filter="url(#glow)">
    <path d="M20 48 V20 H48"/>
    <path d="M852 20 H880 V48"/>
    <path d="M20 292 V320 H48"/>
    <path d="M852 320 H880 V292"/>
  </g>

  <text class="hdr" x="60" y="66"><tspan class="dot">◈</tspan> SKILL WINDOW</text>

  <!-- TypeScript -->
  <text class="skill" x="60" y="112">TypeScript</text>
  <rect x="300" y="103" width="420" height="8" rx="4" fill="#121A38"/>
  <rect x="300" y="103" width="0" height="8" rx="4" fill="#4CC9F0">
    <animate attributeName="width" from="0" to="336" dur="1.1s" begin="0.1s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1" keyTimes="0;1"/>
  </rect>
  <text class="lv" x="750" y="112">Lv. 8</text>

  <!-- Python -->
  <text class="skill" x="60" y="146">Python</text>
  <rect x="300" y="137" width="420" height="8" rx="4" fill="#121A38"/>
  <rect x="300" y="137" width="0" height="8" rx="4" fill="#9D5CFF">
    <animate attributeName="width" from="0" to="336" dur="1.1s" begin="0.25s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1" keyTimes="0;1"/>
  </rect>
  <text class="lv2" x="750" y="146">Lv. 8</text>

  <!-- JavaScript -->
  <text class="skill" x="60" y="180">JavaScript</text>
  <rect x="300" y="171" width="420" height="8" rx="4" fill="#121A38"/>
  <rect x="300" y="171" width="0" height="8" rx="4" fill="#4CC9F0">
    <animate attributeName="width" from="0" to="294" dur="1.1s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1" keyTimes="0;1"/>
  </rect>
  <text class="lv" x="750" y="180">Lv. 7</text>

  <!-- React -->
  <text class="skill" x="60" y="214">React</text>
  <rect x="300" y="205" width="420" height="8" rx="4" fill="#121A38"/>
  <rect x="300" y="205" width="0" height="8" rx="4" fill="#9D5CFF">
    <animate attributeName="width" from="0" to="294" dur="1.1s" begin="0.55s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1" keyTimes="0;1"/>
  </rect>
  <text class="lv2" x="750" y="214">Lv. 7</text>

  <!-- Node.js -->
  <text class="skill" x="60" y="248">Node.js</text>
  <rect x="300" y="239" width="420" height="8" rx="4" fill="#121A38"/>
  <rect x="300" y="239" width="0" height="8" rx="4" fill="#4CC9F0">
    <animate attributeName="width" from="0" to="252" dur="1.1s" begin="0.7s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1" keyTimes="0;1"/>
  </rect>
  <text class="lv" x="750" y="248">Lv. 6</text>

  <!-- Cloudflare Workers -->
  <text class="skill" x="60" y="282">Cloudflare Workers</text>
  <rect x="300" y="273" width="420" height="8" rx="4" fill="#121A38"/>
  <rect x="300" y="273" width="0" height="8" rx="4" fill="#9D5CFF">
    <animate attributeName="width" from="0" to="252" dur="1.1s" begin="0.85s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1" keyTimes="0;1"/>
  </rect>
  <text class="lv2" x="750" y="282">Lv. 6</text>

  <text class="passive" x="60" y="310">PASSIVES · RAPID PROTOTYPING · FIELD TESTING · BUILDS IN PUBLIC</text>
</svg>
